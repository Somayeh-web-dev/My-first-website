<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parfum | Luxury Shop</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .product-card { display: inline-block; width: 200px; margin: 20px; padding: 20px; background: white; border-radius: 10px; }
        img { width: 100%; border-radius: 5px; }
        .price { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Welcome to Parfum</h1>
    
    <div class="product-card">
        <!-- اینجا آدرس عکس عطر اولت رو می‌ذاری -->
        <img src="https://via.placeholder.com/150" alt="Perfume 1">
        <h3>Classic Rose</h3>
        <p class="price">$120</p>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="Perfume 2">
        <h3>Midnight Oud</h3>
        <p class="price">$150</p>
    </div>
</body>
</html>
